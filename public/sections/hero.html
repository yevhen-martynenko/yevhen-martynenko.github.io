<section id="hero" class="hero">
  <canvas id="matrix-canvas"></canvas>
  <div class="hero__container">
    <div class="hero__content">
      <div class="hero__status">
        <span class="hero__status-indicator available"></span>
        Available for work
      </div>
      <div class="hero__text">
        <h1 class="hero__title">
          Hi, I'm
          <span class="hero__name">Yevhen</span>
        </h1>
        <p class="hero__subtitle">Backend Developer</p>
        <p class="hero__description">
          TODO:
        </p>
      </div>

      <div class="hero__actions">
        <a href="#contact" class="btn btn--primary" aria-label="Contact me">
          <span class="btn__text">Contact me</span>
          <svg class="btn__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M7 17L17 7M17 7H7M17 7V17" />
          </svg>
        </a>
        <button id="download-cv-btn" class="btn btn--secondary">
          <svg class="btn__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15V19A2 2 0 0119 21H5A2 2 0 013 19V15M7 10L12 15L17 10M12 15V3" />
          </svg>
          <span class="btn__text">Download CV</span>
        </button>
      </div>

      <div class="hero__social">
        <a href="#" class="hero__social-link icon__github" aria-label="GitHub">
          <div class="icon"></div>
        </a>
        <a href="#" class="hero__social-link icon__linkedin" aria-label="LinkedIn">
          <div class="icon"></div>
        </a>
        <a href="#" class="hero__social-link icon__medium" aria-label="Medium">
          <div class="icon"></div>
        </a>
        <a href="#" class="hero__social-link icon__gmail" aria-label="Gmail">
          <div class="icon"></div>
        </a>
        <a href="#" class="hero__social-link icon__proton" aria-label="ProtonMail">
          <div class="icon"></div>
        </a>

        <a href="https://www.google.com/maps?q=Brașov,+Romania" target="_blank" rel="noopener noreferrer" class="hero__location">
          Location: Brașov, Romania
        </a>
      </div>
    </div>

    <div class="code">
      <div class="terminal">
        <div class="terminal__header">
          <div class="terminal__controls">
            <button class="terminal__dot terminal__dot--red"></button>
            <span class="terminal__dot terminal__dot--yellow"></span>
            <span class="terminal__dot terminal__dot--green"></span>
          </div>
          <div class="terminal__title">main.py</div>
        </div>

        <div class="terminal__body">
          <div class="code__block">
            <div class="code__object">
              <span class="code__keyword">developer</span>
              <span class="code__operator">=</span>
              <span class="code__brace">{</span>
            </div>

            <div class="code__property">
              <span class="code__key">'name'</span>
              <span class="code__operator">:</span>
              <span class="code__string copyable" data-copy="Yevhen Martynenko">'Yevhen Martynenko'</span>
              ,
            </div>

            <div class="code__property">
              <span class="code__key">'gmail'</span>
              <span class="code__operator">:</span>
              <span class="code__string copyable" data-copy="gmail">'gmail'</span>
              ,
            </div>

            <div class="code__property">
              <span class="code__key">'protonmail'</span>
              <span class="code__operator">:</span>
              <span class="code__string copyable" data-copy="protonmail">'protonmail'</span>
              ,
            </div>

            <div class="code__property">
              <span class="code__key">'linkedin'</span>
              <span class="code__operator">:</span>
              <span class="code__string copyable" data-copy="linkedin">'linkedin">''</span>
              ,
            </div>

            <span class="code__brace">}</span>
            <div class="code__comment typewrite-cbe"></div>
            <div class="code__comment typewrite-dcb"></div>
          </div>
        </div>
      </div>

      <div class="scroll-indicator">
        <div class="mouse">
          <div class="wheel"></div>
        </div>
        <span class="scroll-text">scroll</span>
      </div>
    </div>
  </div>
</section>
<div id="hero-sentinel"></div>
